services:
  agent:
    build: .
    stdin_open: true  # docker run -i
    tty: true         # docker run -t
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data  # persist SQLite DBs (whale-tracker, exchange-tracker, token-cache)
      # Uncomment and adjust paths to use local MCP servers in Docker:
      - ~/projects/dex-trader-mcp:/opt/dex-trader-mcp:ro
      - ~/projects/dex-screener-mcp:/opt/dex-screener-mcp:ro
      - ~/projects/dex-rugcheck-mcp:/opt/dex-rugcheck-mcp:ro
      - ~/projects/solana-rpc-mcp:/opt/solana-rpc-mcp:ro
    environment:
      # Uncomment to override host-path MCP paths with container equivalents:
      - DEX_TRADER_MCP_PATH=/opt/dex-trader-mcp/dist/index.js
      - DEX_SCREENER_MCP_PATH=/opt/dex-screener-mcp/dist/index.js
      - DEX_RUGCHECK_MCP_PATH=/opt/dex-rugcheck-mcp/dist/index.js
      - SOLANA_RPC_MCP_PATH=/opt/solana-rpc-mcp/dist/index.js
